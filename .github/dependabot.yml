version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-minor/patch-versions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      npm-minor/patch-security-versions:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    groups:
      action-minor/patch-versions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      action-minor/patch-security-versions:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
