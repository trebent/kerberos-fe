name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Codegen
        run: make codegen

      - name: Verify there are no unstaged changes
        run: |
          if ! git diff --quiet; then
            git status --porcelain
            git diff
            exit 1
          fi

      - name: Build
        run: make build
