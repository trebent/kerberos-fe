name: Static analysis

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@b789df37d6b7526a863bf51b65df64f3f56ffe4f # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint
