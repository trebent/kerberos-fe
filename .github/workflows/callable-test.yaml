name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@7c2c68d20d402ed6a201ada70a81341941093140 # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Test
        run: make test
