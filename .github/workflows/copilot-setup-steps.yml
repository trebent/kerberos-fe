name: Copilot setup steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: make install
