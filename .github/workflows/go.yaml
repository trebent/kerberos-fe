name: Golang

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-go-app
    strategy:
      matrix:
        # these aliases make sure to test both latest and previous minor
        # versions. Useful for library authors to make sure their code works with the latest versions of Go.
        go-version-alias: ["stable", "oldstable"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Disable the builtin caching since it uses the hash of the go.sum file
      # to determine if the cache is valid. This is not ideal since the go.sum
      # file is updated every time a new version of a dependency is downloaded.
      # Not when your code changes.
      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: build-go-mod-${{ hashFiles('sample-go-app/go.sum') }}

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: build-go-build-${{ matrix.go-version-alias }}-${{ hashFiles('sample-go-app/**/*.go', 'sample-go-app/go.mod', 'sample-go-app/go.sum') }}
          restore-keys: |
            build-go-build-${{ matrix.go-version-alias }}-

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}
          path: sample-go-app/coverage.html

      - name: Build
        run: go build -o sample-go-app
