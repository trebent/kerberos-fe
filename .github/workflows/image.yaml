name: Image

run-name: "Build image: ${{ inputs.version || github.ref_name }}"

on:
  workflow_call:
    inputs:
      version:
        description: "Version to tag the image with"
        required: false
        type: string
        default: "latest"
      push:
        description: "Whether to push the image to the registry"
        required: false
        type: boolean
        default: false
  release:
    types:
      - published

concurrency:
  group: image-build-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub packages
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}-sample-go-app

      - name: Build and push go app
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: sample-go-app
          file: sample-go-app/Dockerfile
          push: ${{ inputs.push || github.event_name == 'release' }}
          build-args: |
            VERSION=${{ inputs.version || github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
