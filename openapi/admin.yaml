  /api/admin/logout:
    post:
      tags:
        - users
      operationId: Logout
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Logged the user out successfully.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/refresh:
    post:
      tags:
        - users
      operationId: RefreshUserSession
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Refreshed the user's session.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/groups:
    post:
      tags:
        - users
      operationId: CreateGroup
      requestBody:
        $ref: "#/components/requestBodies/CreateGroupRequest"
      responses:
        "201":
          description: Created the group successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Conflict.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - users
      operationId: GetGroups
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
          description: Got the groups successfully.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
