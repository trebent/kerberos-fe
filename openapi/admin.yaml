# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: "3.0.4"
info:
  version: 0.5.0
  title: Kerberos administration API.
  description: |
    The Kerberos administration API allows administrators to manage a Kerberos deployment.
components:
  requestBodies:
    CreateUserRequest:
      description: Request body for creating a user.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
                minLength: 1
              password:
                type: string
                minLength: 1
            required:
              - username
              - password
    UpdateUserRequest:
      description: Request body for updating a user.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
                minLength: 1
            required:
              - username
    ChangePasswordRequest:
      description: Request body for changing a user's password.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              oldPassword:
                type: string
                minLength: 1
              newPassword:
                type: string
                minLength: 1
            required:
              - oldPassword
              - newPassword
    UpdateUserGroupsRequest:
      description: Request body for updating a user's groups.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              groupIDs:
                type: array
                items:
                  type: integer
            required:
              - groupIDs
    LoginUserRequest:
      description: Request body for logging a user in.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
                minLength: 1
              password:
                type: string
                minLength: 1
            required:
              - username
              - password
    CreateGroupRequest:
      description: Request body for creating a group.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
              permissionIDs:
                type: array
                items:
                  type: integer
            required:
              - name
              - permissionIDs
    UpdateGroupRequest:
      description: Request body for updating a group.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
              permissionIDs:
                type: array
                items:
                  type: integer
            required:
              - name
              - permissionIDs
    StartDebugSessionRequest:
      description: Request body for starting a debug session for a backend.
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              durationSeconds:
                type: integer
                minimum: 60
                maximum: 3600
                default: 300
                description: Duration in seconds to keep the backend in debug mode. If not
                  provided, the backend will be kept in debug mode until debug
                  is disabled, or for a maximum of 1 hour. Minimum is 1 minute,
                  defaults to 5 minutes.
  schemas:
    DebugSession:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          description: The ID for the debug session.
        backend:
          type: string
          description: The backend that the call was made to.
        startedAt:
          type: string
          format: date-time
          description: The time when the debug session started.
        expiresAt:
          type: string
          format: date-time
          description: The time when the debug session expires.
        stoppedAt:
          type: string
          format: date-time
          description: The time when the debug session was stopped. Null if the session is
            still active.
      required:
        - id
        - backend
        - startedAt
        - expiresAt
    DebugSessionCall:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          description: The ID for the call.
        startedAt:
          type: string
          format: date-time
          description: The time when the call was received.
        stoppedAt:
          type: string
          format: date-time
          description: The time when the call was finished being handled. Null if the call is
            still being handled.
        url:
          type: string
          description: The full URL of the request.
        method:
          type: string
          description: The HTTP method of the operation.
        statusCode:
          type: integer
          description: The HTTP status code of the response.
        flowTransitions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/FlowTransition"
          description: The flow transitions that occurred during this operation, in
            chronological order.
      required:
        - id
        - startedAt
        - stoppedAt
        - url
        - method
        - statusCode
        - flowTransitions
    FlowTransition:
      type: object
      description: |
        A flow transition that occurred during a debug session call. A flow transition represents 
        a flow component's handling of a request, in both directions.
      properties:
        component:
          type: string
          description: The flow component that the transition corresponds to.
        direction:
          type: string
          enum: [inbound, outbound]
          description: |
            The direction of the flow transition. Some components handle requests
            both coming into the system (inbound) and going out of the system (outbound).
        startedAt:
          type: string
          format: date-time
          description: The time when the flow transition started.
        stoppedAt:
          type: string
          format: date-time
          description: The time when the flow transition stopped. Null if the transition
            is still active.
        result:
          $ref: "#/components/schemas/FlowTransitionResult"
      additionalProperties: false
      required:
        - component
        - direction
        - startedAt
        - stoppedAt
        - result
    FlowTransitionResult:
      type: object
      description: |
        The result of a flow transition. A flow transition can either succeed or fail.
      properties:
        outcome:
          type: string
          enum: [success, failure]
        cause:
          type: string
          description: The cause of the flow transition result, if outcome is 'failure'.
      additionalProperties: false
      required:
        - outcome
    MeResponse:
      type: object
      additionalProperties: false
      properties:
        isSuperuser:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
      required:
        - isSuperuser
    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        username:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
      required:
        - id
        - username
    Group:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
          minLength: 1
        permissions:
          type: array
          description: |
            The permissions that the group has. This may or may not be set depending on the endpoint.
          items:
            $ref: "#/components/schemas/Permission"
      required:
        - id
        - name
    Permission:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    FlowMeta:
      type: object
      properties:
        name:
          type: string
          description: The name of the flow component, e.g. "observability", "router".
        data:
          type: object
          description: The metadata for the flow component. The structure of the metadata
            depends on the flow component.
          anyOf:
            - $ref: "#/components/schemas/FlowMetaDataObservability"
            - $ref: "#/components/schemas/FlowMetaDataRouter"
            - $ref: "#/components/schemas/FlowMetaDataAuth"
            - $ref: "#/components/schemas/FlowMetaDataOAS"
            - $ref: "#/components/schemas/NoFlowMetaData"
      required:
        - name
        - data
      additionalProperties: false
    FlowMetaDataObservability:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
      additionalProperties: false
    FlowMetaDataRouter:
      type: object
      additionalProperties: false
      properties:
        backends:
          type: array
          items:
            $ref: "#/components/schemas/FlowMetaDataRouterBackend"
    FlowMetaDataRouterBackend:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
      required:
        - name
        - host
        - port
    FlowMetaDataAuth:
      type: object
      additionalProperties: false
      properties:
        methods:
          $ref: "#/components/schemas/FlowMetaDataAuthMethods"
        scheme:
          $ref: "#/components/schemas/FlowMetaDataAuthScheme"
    FlowMetaDataAuthMethods:
      type: object
      additionalProperties: false
      properties:
        basic:
          $ref: "#/components/schemas/FlowMetaDataAuthMethodBasic"
    FlowMetaDataAuthMethodBasic:
      type: object
      additionalProperties: false
    FlowMetaDataAuthScheme:
      type: object
      additionalProperties: false
      properties:
        mappings:
          type: array
          items:
            $ref: "#/components/schemas/FlowMetaDataAuthSchemeMapping"
    FlowMetaDataAuthSchemeMapping:
      type: object
      additionalProperties: false
      properties:
        backend:
          type: string
        method:
          type: string
        exempt:
          type: array
          items:
            type: string
        authorization:
          $ref: "#/components/schemas/FlowMetaDataAuthSchemeMappingAuthorization"
      required:
        - backend
        - method
    FlowMetaDataAuthSchemeMappingAuthorization:
      type: object
      additionalProperties: false
      properties:
        groups:
          type: array
          items:
            type: string
        paths:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    FlowMetaDataOAS:
      type: object
      additionalProperties: false
      properties:
        backends:
          type: array
          items:
            type: string
    NoFlowMetaData:
      type: object
      description: No metadata for the flow component.
      additionalProperties: false
    APIErrorResponse:
      type: object
      additionalProperties: false
      properties:
        errors:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - errors
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

security:
  - cookieAuth: []

tags:
  - name: users
    description: User management endpoints.
  - name: flow
    description: Flow management endpoints.
  - name: debug
    description: Debug management endpoints.
  - name: oas
    description: OpenAPI specification management endpoints.

paths:
  #
  # Superuser management endpoints.
  #

  /api/admin/superuser/login:
    post:
      tags:
        - users
      security: []
      operationId: LoginSuperuser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                  minLength: 1
                clientSecret:
                  type: string
                  minLength: 1
              required:
                - clientId
                - clientSecret
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Logged the superuser in.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to log the superuser in.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/superuser/logout:
    post:
      tags:
        - users
      operationId: LogoutSuperuser
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Logged the superuser out.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/superuser/refresh:
    post:
      tags:
        - users
      operationId: RefreshSuperuserSession
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Refreshed the superuser's session.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/superuser/password:
    put:
      tags:
        - users
      operationId: ChangeSuperuserPassword
      requestBody:
        $ref: "#/components/requestBodies/ChangePasswordRequest"
      responses:
        "204":
          description: Changed the superuser's password successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  #
  # User management endpoints.
  #

  /api/admin/me:
    get:
      tags:
        - users
      operationId: GetMe
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
          description: Got the current user's information successfully.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/users:
    post:
      tags:
        - users
      operationId: CreateUser
      requestBody:
        $ref: "#/components/requestBodies/CreateUserRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Created the user successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Conflict.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - users
      operationId: GetUsers
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
          description: Got the users successfully.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/users/{userID}:
    get:
      tags:
        - users
      operationId: GetUser
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Got the user successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    put:
      tags:
        - users
      operationId: UpdateUser
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/UpdateUserRequest"
      responses:
        "204":
          description: Updated the user successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Conflict.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    delete:
      tags:
        - users
      operationId: DeleteUser
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted the user successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/users/{userID}/password:
    put:
      tags:
        - users
      operationId: ChangeUserPassword
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/ChangePasswordRequest"
      responses:
        "204":
          description: Changed the user's password successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/users/{userID}/groups:
    put:
      tags:
        - users
      operationId: UpdateUserGroups
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/UpdateUserGroupsRequest"
      responses:
        "204":
          description: Updated the user's groups successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/login:
    post:
      tags:
        - users
      security: []
      operationId: Login
      requestBody:
        $ref: "#/components/requestBodies/LoginUserRequest"
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Logged the user in.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
