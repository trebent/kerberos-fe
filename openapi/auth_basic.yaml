# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: "3.0.4"
info:
  version: 0.3.0
  title: Kerberos basic authentication API.
  description: |
    The Kerberos basic authentication API provides support for managing user accounts, groups,
    and organisations.

    Organisations provide support for user isolation. A user in org. A cannot access information
    protected by org. B. Organisations provide isolation by associating sets of users with an
    organisation entity, the target backend will receive an information element pointing out 
    which organisation a request was made for. This method of isolation only works if Kerberos
    is the only possible path to reach the target backend service, or the information element 
    will be possible to spoof.

    The basic authentication API provides user group support, allowing for role-based authorization.
components:
  requestBodies:
    LoginUserRequest:
      description: A request to log a user in.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
              password:
                type: string
            required:
              - username
              - password
    CreateUserRequest:
      description: A request to create a new user.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 5
              password:
                type: string
                minLength: 10
                maxLength: 40
            required:
              - name
              - password
    CreateGroupRequest:
      description: A request to create a new group.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
            required:
              - name
    CreateOrganisationRequest:
      description: A request to create a new organisation.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
            required:
              - name
  schemas:
    APIErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - errors
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        groups:
          $ref: "#/components/schemas/UserGroups"
      required:
        - id
        - name
    UserGroups:
      type: array
      items:
        $ref: "#/components/schemas/Group"
    Group:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
      required:
        - id
        - name
    Organisation:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      required:
        - id
        - name
  parameters:
    userid:
      name: userID
      in: path
      required: true
      description: A user ID.
      schema:
        type: integer
        format: int64
    orgid:
      name: orgID
      in: path
      required: true
      description: An organisation ID.
      schema:
        type: integer
        format: int64
    groupid:
      name: groupID
      in: path
      required: true
      description: A group ID.
      schema:
        type: integer
        format: int64
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

security:
  - cookieAuth: []

tags:
  - name: organisations
    description: Organisation management endpoints.
  - name: users
    description: User management endpoints.
  - name: groups
    description: Group management endpoints.

paths:
  # Creating a new organisation will automatically create an admin user.
  /api/auth/basic/organisations:
    post:
      tags:
        - organisations
      operationId: CreateOrganisation
      requestBody:
        $ref: "#/components/requestBodies/CreateOrganisationRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Organisation"
                  - type: object
                    properties:
                      adminUserId:
                        type: integer
                        format: int64
                      adminUsername:
                        type: string
                      adminPassword:
                        type: string
                    required:
                      - adminUserId
                      - adminUsername
                      - adminPassword
          description: Created a new organisation.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to create the organisation.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to create the organisation.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Organisation already exists.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - organisations
      operationId: ListOrganisations
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organisation"
          description: Listed all organisations.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the organisation.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the organisation.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}:
    parameters:
      - "$ref": "#/components/parameters/orgid"
    put:
      tags:
        - organisations
      operationId: UpdateOrganisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Organisation"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
          description: Updated an organisation.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the organisation.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the organisation.
        "404":
          description: Organisation does not exist.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Conflict.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - organisations
      operationId: GetOrganisation
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
          description: Got an organisation.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the organisation.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the organisation.
        "404":
          description: Organisation does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    delete:
      tags:
        - organisations
      operationId: DeleteOrganisation
      responses:
        "204":
          description: Deleted an organisation.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to delete the organisation.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to delete the organisation.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/login:
    parameters:
      - $ref: "#/components/parameters/orgid"
    post:
      tags:
        - users
      operationId: Login
      security: []
      requestBody:
        $ref: "#/components/requestBodies/LoginUserRequest"
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Logged a user in.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to log a user in.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/logout:
    parameters:
      - $ref: "#/components/parameters/orgid"
    post:
      tags:
        - users
      operationId: Logout
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Logged a user out.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to log the user out.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/refresh:
    parameters:
      - $ref: "#/components/parameters/orgid"
    post:
      tags:
        - users
      operationId: Refresh
      responses:
        "204":
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abcde12345; Path=/; HttpOnly
          description: Refreshed a user's session.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to log a user in.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  # When invoking the /user path, the requests are automatically executed on the
  # organisation the executing user belongs to. This is ALWAYS the case, except when creating the
  # first user, which is done behind the scenes when creating a new organisation.
  /api/auth/basic/organisations/{orgID}/users:
    parameters:
      - $ref: "#/components/parameters/orgid"
    post:
      tags:
        - users
      operationId: CreateUser
      requestBody:
        $ref: "#/components/requestBodies/CreateUserRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Created a new user.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to create the user.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to create the user.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: User already exists.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - users
      operationId: ListUsers
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
          description: Listed all users.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to list users.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to list users.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/users/{userID}:
    parameters:
      - $ref: "#/components/parameters/orgid"
      - $ref: "#/components/parameters/userid"
    get:
      tags:
        - users
      operationId: GetUser
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Got a user.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the user.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the user.
        "404":
          description: User does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    put:
      tags:
        - users
      operationId: UpdateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Updated a user.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the user.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the user.
        "404":
          description: User does not exist.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Conflict.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    delete:
      tags:
        - users
      operationId: DeleteUser
      responses:
        "204":
          description: Deleted a user.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to delete the user.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to delete the user.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/users/{userID}/groups:
    parameters:
      - $ref: "#/components/parameters/orgid"
      - $ref: "#/components/parameters/userid"
    put:
      tags:
        - users
      operationId: UpdateUserGroups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserGroups"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroups"
          description: Updated the user's group bindings.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the user's groups.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the user's groups.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - users
      operationId: GetUserGroups
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroups"
          description: Got a user's group bindings.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to list the user's groups.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to list the user's groups.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/users/{userID}/password:
    parameters:
      - $ref: "#/components/parameters/orgid"
      - $ref: "#/components/parameters/userid"
    put:
      tags:
        - users
      operationId: ChangePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                  minLength: 10
                password:
                  type: string
                  minLength: 10
              required:
                - oldPassword
                - password
      responses:
        "204":
          description: Changed a user's password.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to change password.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to change password.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/groups:
    parameters:
      - "$ref": "#/components/parameters/orgid"
    post:
      tags:
        - groups
      operationId: CreateGroup
      requestBody:
        $ref: "#/components/requestBodies/CreateGroupRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
          description: Created a group in the organisation.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to create group.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to create group.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Group already exists.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - groups
      operationId: ListGroups
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
              example:
                - name: Group 1
                - name: Group 2
          description: Listed all groups in the organisation.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to list groups.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to list groups.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/auth/basic/organisations/{orgID}/groups/{groupID}:
    parameters:
      - "$ref": "#/components/parameters/orgid"
      - "$ref": "#/components/parameters/groupid"
    put:
      tags:
        - groups
      operationId: UpdateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Group"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
          description: Updated a group.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the group.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to update the group.
        "404":
          description: Groups does not exist.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Conflict.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      tags:
        - groups
      operationId: GetGroup
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
          description: Got a group.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the group.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to get the group.
        "404":
          description: Group does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    delete:
      tags:
        - groups
      operationId: DeleteGroup
      responses:
        "204":
          description: Deleted a group.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to delete the group.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to delete the group.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
