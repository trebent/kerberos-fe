<div class="card-header-container">
  <h3>Users</h3>
</div>
<div class="card-content">

  <h4>Create User</h4>
  @if (createErrors().length) {
  <app-error-display [errors]="createErrors()" />
  }
  <form [formGroup]="createForm" (ngSubmit)="submitCreate()">
    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" autocomplete="username" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="new-password" />
    </mat-form-field>
    <div class="form-actions">
      <button mat-flat-button type="submit" [disabled]="createForm.invalid">Create</button>
    </div>
  </form>

  <mat-divider></mat-divider>
  <h4>All users</h4>

  @if (usersResource.error()) {
  <app-error-display [errors]="['Failed to load users.']" />
  }

  @if (usersResource.isLoading()) {
  <mat-spinner diameter="32" />
  }

  <mat-form-field class="filter-field">
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. admin" #input>
  </mat-form-field>
  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let u">{{ u.id }}</td>
      </ng-container>
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Username</th>
        <td mat-cell *matCellDef="let u">{{ u.username }}</td>
      </ng-container>
      <ng-container matColumnDef="groups">
        <th mat-header-cell *matHeaderCellDef>Groups</th>
        <td mat-cell *matCellDef="let u">{{ u.groups?.length ? u.groups!.map(groupName).join(', ') : '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions" stickyEnd>
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let u">
          <button matIconButton (click)="openEdit(u)" aria-label="Edit user">
            <mat-icon>edit</mat-icon>
          </button>
          <button matIconButton (click)="deleteUser(u.id)" aria-label="Delete user">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </div>

  @if (selectedUser()) {
  <app-user-edit [user]="selectedUser()!" (saved)="onDetailSaved()" (closed)="onDetailClosed()" />
  }
</div>
