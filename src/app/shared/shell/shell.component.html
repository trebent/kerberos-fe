<mat-sidenav-container class="shell-container">
  <mat-sidenav
    [opened]="sidenavOpen()"
    mode="side"
    class="shell-sidenav"
  >
    <div class="sidenav-header">
      <span class="app-title">Kerberos</span>
    </div>

    <mat-divider />

    @for (section of navSections; track section.heading) {
      <div class="nav-section-heading">{{ section.heading }}</div>
      <mat-nav-list>
        @for (item of section.items; track item.route) {
          <a
            mat-list-item
            [routerLink]="item.route"
            routerLinkActive="active-link"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      </mat-nav-list>
      <mat-divider />
    }
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar class="shell-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>
      <button mat-icon-button (click)="logout()" aria-label="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="shell-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
